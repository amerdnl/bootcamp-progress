<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animation</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        margin: 40px;
      }

      @keyframes toastIn {
        0% {
          transform: translateY(20px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .toast {
        width: 360px;
        border: 2px solid #000;
        padding: 16px;
        margin-bottom: 30px;

        animation-name: toastIn;
        animation-duration: 0.6s;
        animation-timing-function: ease-out;
        animation-delay: 0.2s;
        animation-fill-mode: forwards;
        opacity: 0;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .spinner {
        width: 46px;
        height: 46px;
        border: 6px solid #000;
        border-top-color: transparent;
        border-radius: 50%;
        margin-bottom: 30px;

        animation: spin 1s linear 0s infinite normal none;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.1);
          opacity: 1;
        }
      }

      .badge {
        display: inline-block;
        border: 2px solid #000;
        padding: 8px 12px;
        margin-bottom: 30px;
        margin-top: 20px;

        animation: pulse 0.7s ease-in-out 0s infinite alternate none;
      }

      .pause-hint {
        margin-top: 10px;
        font-size: 14px;
      }

      .badge:hover {
        animation-play-state: paused;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>1. toast notification appears</h2>
    <div class="toast">
      create a box with a class of toast, save and then after 0.2 seconds,
      smoothly appears
    </div>

    <h2>2. loading spinner</h2>
    <div class="spinner"></div>

    <h2>3. emphasis badge pulse</h2>
    <div class="badge">HOT</div>
    <div class="pause-hint">
      when you hover over the badge, the animation stops.
    </div>
  </body>
</html>
