<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>media query</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }

      .box {
        padding: 40px;
        text-align: center;
        font-size: 20px;
      }

      .box {
        background-color: deepskyblue;
      }

      @media (max-width: 1024px) {
        .box {
          background-color: gold;
          font-size: 18px;
        }
      }

      @media (max-width: 767px) {
        .box {
          background-color: deeppink;
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      the color and font size change according to the screen size
    </div>
  </body>
</html>
