<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>relative</title>
    <style>
      .box1 {
        position: relative;
        width: 150px;
        height: 150px;
        background-color: deeppink;
        top: 30px;
        left: 50px;
        z-index: 10;
      }

      .box2 {
        position: relative;
        width: 150px;
        height: 150px;
        background-color: deepskyblue;
      }
    </style>
  </head>
  <body>
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
  </body>
</html>
