<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS applied</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .internal {
        color: deepskyblue;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Comparison of CSS Application</h1>
    <!-- use class to put style but internally -->
    <p class="internal">
      this sentences has been styled with an internal style sheet
    </p>

    <!-- dont use class to put style but internally -->
    <p style="color: green">
      this is also has been styled with an internal style sheet
    </p>
  </body>
</html>
