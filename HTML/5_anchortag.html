<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor Tag</title>
  </head>
  <body>
    <h2>1. anchor tag using relative path</h2>
    <a href="about.html">Lets go to the about page</a>

    <h2>2. anchor tag using absolute path</h2>
    <a href="/pages/contact.html">click to go to the contact page</a>

    <h2>3. using an absolute path, In h2, navigating to external site</h2>
    <a href="https://www.google.com" target="_blank" title="Google Home Page"
      >click to visit google</a
    >

    <h2>4. click image and move to another page</h2>
    <a href="https://www.wikipedia.org" target="_blank" title="Go to Wikipedia"
      ><img src="/Pierce-The-Veil-April-2024-promo (1).jpg" alt="" />link to
      wikipedia</a
    >
  </body>
</html>
