<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Tag</title>
  </head>
  <body>
    <table border="1">
      <thead>
        this is table example:

        <tr>
          <th colspan="3">Report Card Student</th>
        </tr>
        <tr>
          <th>Name</th>
          <th>Subject</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="2">John</td>
          <td>HTML</td>
          <td>90</td>
        </tr>
        <tr>
          <td>Math</td>
          <td>89</td>
        </tr>
        <tr>
          <td>Bruno</td>
          <td>CSS</td>
          <td>87</td>
        </tr>
        <tr>
          <td>Malik</td>
          <td>JavaScript</td>
          <td>95</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
