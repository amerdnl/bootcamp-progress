<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Tag</title>
  </head>
  <body>
    <h2>1. Loading an Image with Relative Path using h2 tag</h2>
    <!-- image in the images folder -->
    <img
      src="images/pierce-the-veil-band-members-outdoor-portrait-5alt91vpclhmm4b3.jpg"
      alt="ptv band members outdoor"
    />
    <hr />

    <h2>
      2. Loading an Image with Absolute Path using h2 tag (using local file
      system)
    </h2>
    <img src="/Pierce-the-Veil-Logo-Vector.svg-.png" alt="ptv logo" />
    <hr />

    <h2>3. Loading an Image from Internet (Using URL) using absolute path</h2>
    <img
      src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_lockup_default_1x_r7.png"
      alt="Gmail Logo"
    />
  </body>
</html>
