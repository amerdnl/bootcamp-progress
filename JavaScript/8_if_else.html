<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if ~ else statement</title>
  </head>
  <body>
    <h2>if ~ else statement</h2>
    <script>
      let age = 25;
      if (age >= 18) {
        console.log("youre an adult");
      } else {
        console.log("youre a minor");
      }
    </script>
  </body>
</html>
