<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>do ~ while statement</title>
  </head>
  <body>
    <h2>do ~ while statement</h2>
    <script>
      let num = 1;
      do {
        console.log(`current number: ${num}`);
        num++;
      } while (num <= 5);
    </script>
  </body>
</html>
