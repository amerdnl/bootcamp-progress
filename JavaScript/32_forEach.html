<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forEach element in the array</title>
  </head>
  <body>
    <h2>forEach element in the array</h2>
    <script>
      let fruits = ["apples", "bananas", "oranges"];
      fruits.forEach(function (fruit, index, arr) {
        console.log(`${fruit}, ${index}, ${arr} `);
      });
    </script>
  </body>
</html>
