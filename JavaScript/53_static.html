<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>static</title>
  </head>
  <body>
    <h2>static</h2>
    <script>
      class MathTool {
        static add(a, b) {
          return a + b;
        }
      }

      console.log(MathTool.add(10, 5));
    </script>
  </body>
</html>
