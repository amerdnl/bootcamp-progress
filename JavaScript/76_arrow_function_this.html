<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>arrow function this</title>
  </head>
  <body>
    <script>
      const obj = {
        name: "ameer",
        sayHello: function () {
          setTimeout(function () {
            console.log("Hello! my name is " + this.name);
          }, 2000);
        },
      };
      //   obj.sayHello();

      const obj2 = {
        name: "malik",
        sayHello: function () {
          setTimeout(() => {
            console.log("Hello! my name is " + this.name);
          }, 2000);
        },
      };

      obj2.sayHello();
    </script>
  </body>
</html>
