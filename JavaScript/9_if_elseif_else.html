<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if~else if~else statement</title>
  </head>
  <body>
    <h2>if~else if~else statement</h2>
    <script>
      let age = 12;
      if (age >= 18) {
        console.log("youre an adult");
      } else if (age >= 13) {
        console.log("youre a teenager");
      } else if (age >= 7) {
        console.log("youre a child");
      } else {
        console.log("youre a baby");
      }
    </script>
  </body>
</html>
