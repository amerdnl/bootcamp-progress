<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ternary operator</title>
  </head>
  <body>
    <h2>script tag for the ternary operator</h2>
    <script>
      const age = 15;
      const message = age >= 18 ? "youre an adult." : "youre a minor.";
      console.log(message);
    </script>
  </body>
</html>
