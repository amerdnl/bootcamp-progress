<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cookie-based popup for 'do not show today'</title>
  </head>
  <body>
    <div
      id="popup"
      style="
        padding: 20px;
        background: #f0f0f0;
        border: 1px solid #ccc;
        width: 300px;
      "
    ></div>
    <p><strong>[Notice]</strong> A new lecture has been updated</p>
    <label for="hideToday"
      ><input type="checkbox" id="hideToday" />not to see each other for the
      rest of the day</label
    >
    <br /><br />
    <button onclick="clearPopup()">clear popup</button>

    <script>
      function setCookie(name, value, days) {
        const d = new Date();
        d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
        const expires = "expires=" + d.toUTCString();
        document.cookie = ` ${name}=${value}; ${expires}; path=/`;
      }

      function getCookie(name) {
        const decodedCookie = decodeURIComponent(document.cookie);
        const cookies = decodedCookie.split("; ");
        for (let cookie of cookies) {
          const [key, value] = cookie.split("=");
          if (key === name) return value;
        }
        return null;
      }

      function clearPopup() {
        const checkbox = document.getElementById("hideToday");
        if (checkbox.checked) {
          setCookie("hidePopup", "true", 1);
        }
        document.getElementById("popup").style.display = "none";
      }

      window.onload = function () {
        if (getCookie("hidePopup") === "true") {
          document.getElementById("popup").style.display = "none";
        }
      };
    </script>
  </body>
</html>
