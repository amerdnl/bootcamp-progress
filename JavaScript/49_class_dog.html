<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class Dog</title>
  </head>
  <body>
    <h2>class Dog</h2>
    <script>
      class Dog {
        bark() {
          console.log("woof woof!");
        }
      }

      const dog = new Dog();
      dog.bark();
    </script>
