<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nested for loop multiplication table</title>
  </head>
  <body>
    <h2>nested for loop multiplication table</h2>
    <script>
      for (let dan = 2; dan <= 9; dan++) {
        for (let i = 1; i <= 9; i++) {
          console.log(`${dan} * ${i} = ${dan * i}`);
        }
      }
    </script>
  </body>
</html>
