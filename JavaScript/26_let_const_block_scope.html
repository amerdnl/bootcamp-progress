<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>let / const block scope</title>
  </head>
  <body>
    <h2>let / const block scope</h2>
    <script>
      if (true) {
        let y = 20;
        const z = 30;
      }
      console.log(y);
      console.log(z);
    </script>
  </body>
</html>
