<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prototype</title>
  </head>
  <body>
    <h2>prototype</h2>
    <script>
      const proto = {
        greet: function () {
          console.log(`hello my name is ${this.name}`);
        },
      };

      const person = Object.create(proto);
      person.name = "ameer";
      person.age = 23;
      person.greet();
    </script>
  </body>
</html>
