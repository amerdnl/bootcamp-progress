<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for loop example</title>
  </head>
  <body>
    <h2>for loop example</h2>
    <script>
      for (let i = 1; i <= 5; i++) {
        console.log(`current number: ${i}`);
      }
    </script>
  </body>
</html>
