<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>continue</title>
  </head>
  <body>
    <h2>continue</h2>
    <script>
      for (let i = 1; i <= 5; i++) {
        if (i === 3) {
          continue;
        }
        console.log(`the value of i: ${i}`);
      }
    </script>
  </body>
</html>
