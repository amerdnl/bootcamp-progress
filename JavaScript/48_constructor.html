<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>constructor</title>
  </head>
  <body>
    <h2>constructor</h2>
    <script>
      class Animal {
        constructor(type) {
          this.type = type;
        }
      }

      const dog = new Animal("puppy");
      console.log(dog.type);
    </script>
  </body>
</html>
