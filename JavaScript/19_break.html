<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>break statement example</title>
  </head>
  <body>
    <h2>break statement example</h2>
    <script>
      for (let i = 1; i <= 10; i++) {
        if (i > 5) {
          break;
        }
        console.log(`the value of i: ${i}`);
      }
    </script>
  </body>
</html>
