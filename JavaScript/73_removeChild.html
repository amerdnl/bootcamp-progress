<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM remove child</title>
  </head>
  <body>
    <ul id="list">
      <li id="item1">the first item</li>
    </ul>

    <script>
      const ul = document.getElementById("list");
      const li = document.getElementById("item1");
      ul.removeChild(li);
    </script>
  </body>
</html>
