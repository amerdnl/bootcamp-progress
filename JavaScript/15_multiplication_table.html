<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>while multiplication table</title>
  </head>
  <body>
    <h2>while multiplication table</h2>
    <script>
      let dan = 7;
      let i = 1;
      while (i <= 9) {
        console.log(`${dan} * ${i} = ${dan * i}`);
        i++;
      }
    </script>
  </body>
</html>
