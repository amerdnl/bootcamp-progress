<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable</title>
  </head>
  <body>
    <h2>Variable</h2>
    <script>
      let userName = "Ameer Danial";
      const age = "23";

      console.log("initial value");
      console.log("userName: ", userName);
      console.log("age: ", age);

      let message = "Hello There";
      let score = 90;

      console.log("string/number variable");
      console.log("message: ", message);
      console.log("score: ", score);

      console.log("comparing value before and after the change");
      console.log("[before change] userName: ", userName);
      userName = "Malik";
      console.log("[after change] userName: , userName");

      console.log("[before change] score: ", score);
      score = 100;
      console.log("[after change] score: ", score);
    </script>
  </body>
</html>
